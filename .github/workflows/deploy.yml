name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# 같은 브랜치에 연달아 푸시하면 앞선 PR 검사는 취소한다. main 배포는 끝까지 돌린다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # 알파가 산출물에 실제로 살아 있는지는 브라우저를 띄워 변환해 보지 않으면 알 수 없다.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: ffmpeg 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # 러너에 미리 깔린 Google Chrome을 쓴다. Chromium과 달리 AAC·H.264 인코더를 품고 있어
      # MP4 출력 경로를 여기서만 실제로 검증할 수 있다.
      - name: 도구 버전 확인
        run: |
          google-chrome --version
          ffmpeg -version | head -1

      - run: npm run fixtures
      - run: npm run test:e2e

      - name: 실패한 산출물 남기기
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-output
          path: tmp/e2e/
          retention-days: 7
          if-no-files-found: ignore

  deploy:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # Pages는 저장소 설정에서 build_type=workflow로 미리 켜 둔다.
      # configure-pages의 enablement 옵션은 GITHUB_TOKEN으로는 동작하지 않는다.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v5
